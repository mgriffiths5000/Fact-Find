<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Protection Fact Find</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="config.js"></script>

<style>
  :root {
    --bg: #f6f3ee;
    --bg-card: #ffffff;
    --ink: #1c2229;
    --ink-soft: #4f5862;
    --ink-mute: #8b929b;
    --accent: #2f4f3c;            /* deep eucalyptus */
    --accent-soft: #e7ede5;
    --accent-ink: #213a2c;
    --line: #e6e1d8;
    --line-strong: #d4ccbe;
    --warn: #b94a3a;
    --warn-soft: #fbe9e5;
    --shadow-sm: 0 1px 2px rgba(28,34,41,.04), 0 1px 1px rgba(28,34,41,.03);
    --shadow-md: 0 4px 14px -4px rgba(28,34,41,.08), 0 2px 4px rgba(28,34,41,.04);
    --shadow-lg: 0 24px 60px -24px rgba(28,34,41,.18), 0 8px 24px -12px rgba(28,34,41,.10);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --serif: 'Instrument Serif', 'Georgia', serif;
    --sans: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(47,79,60,0.05), transparent 60%),
      radial-gradient(700px 400px at -10% 110%, rgba(47,79,60,0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ========== Top bar ========== */
  header.bar {
    position: sticky; top: 0; z-index: 5;
    background: rgba(246,243,238,0.92);
    backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .bar-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 10px 16px 10px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .bar-top { display: flex; align-items: center; }
  .bar-progress { width: 100%; }
  .brand { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .brand .lockup {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--ink);
    white-space: nowrap;
  }
  .brand .sep { color: var(--ink-mute); font-size: 12px; }
  .brand .sub { font-size: 12px; color: var(--ink-soft); white-space: nowrap; }

  .progress { display: none; } /* legacy — replaced by sectioned bar */

  /* ========== Layout ========== */
  main {
    position: relative;
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 24px 120px;
    z-index: 1;
  }
  .stage {
    min-height: 60vh;
    display: flex; flex-direction: column; justify-content: center;
  }
  .card {
    background: transparent;
  }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--accent-ink);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 20px;
  }
  .eyebrow .dot {
    width: 5px; height: 5px; border-radius: 99px; background: var(--accent);
  }
  .eyebrow .prefix-tag {
    background: var(--accent-soft);
    color: var(--accent-ink);
    border: 1px solid #cfdcd2;
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    letter-spacing: 0.04em;
    font-weight: 600;
    text-transform: none;
  }

  h1.q-title {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(28px, 4.4vw, 40px);
    line-height: 1.18;
    letter-spacing: -0.018em;
    margin: 0 0 14px;
    color: var(--ink);
  }
  .q-title em { font-style: italic; color: var(--accent-ink); font-weight: 400; }
  .q-desc {
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1.6;
    margin: 0 0 32px;
    max-width: 600px;
  }
  .q-desc a { color: var(--accent-ink); text-decoration: underline; text-underline-offset: 3px; }
  .q-required { color: var(--warn); margin-left: 4px; }

  /* ========== Inputs ========== */
  .field { margin: 8px 0 0; }

  .input,
  textarea.input,
  select.input {
    width: 100%;
    font-family: var(--sans);
    font-size: 17px;
    color: var(--ink);
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    line-height: 1.45;
    transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    box-shadow: var(--shadow-sm);
  }
  .input:focus, textarea.input:focus, select.input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(47,79,60,0.12);
  }
  textarea.input { min-height: 130px; resize: vertical; }
  select.input { appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='none' stroke='%234f5862' stroke-width='1.6' d='M1 1.5l5 5 5-5'/></svg>");
    background-repeat: no-repeat; background-position: right 16px center;
    padding-right: 42px;
  }

  /* Choice buttons */
  .choices { display: grid; gap: 10px; margin-top: 4px; }
  .choice {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--bg-card);
    border: 1px solid var(--line-strong);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: border-color .15s ease, background .15s ease, transform .08s ease;
    user-select: none;
    box-shadow: var(--shadow-sm);
  }
  .choice:hover { border-color: var(--accent); background: #fdfcf9; }
  .choice:active { transform: translateY(1px); }
  .choice .key {
    font-family: var(--serif);
    font-size: 13px;
    width: 26px; height: 26px;
    border: 1px solid var(--line-strong);
    border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-soft);
    flex-shrink: 0;
    background: #fff;
    font-weight: 500;
  }
  .choice .label { font-size: 16px; color: var(--ink); }
  .choice.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .choice.selected .key {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .choice input[type=checkbox], .choice input[type=radio] { display: none; }

  /* Yes/No two-up */
  .yesno { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .yesno { grid-template-columns: 1fr; } }

  .helper {
    font-size: 13px;
    color: var(--ink-mute);
    margin-top: 12px;
  }
  .error-msg {
    color: var(--warn);
    background: var(--warn-soft);
    border: 1px solid #f0c6bd;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    margin-top: 14px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Statement / section card */
  .info-card {
    border-left: 2px solid var(--accent);
    padding: 4px 0 4px 18px;
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1.65;
    margin-top: 12px;
  }

  /* Inline group — render multiple subfields in one screen */
  .subfields { display: grid; gap: 20px; margin-top: 8px; }
  .subfield-row { display: grid; gap: 8px; }
  .subfield-row .sub-label {
    font-size: 14px; font-weight: 500; color: var(--ink-soft);
    line-height: 1.4;
  }
  .input.error-input {
    border-color: var(--warn);
    box-shadow: 0 0 0 3px rgba(185,74,58,0.10);
  }

  /* ========== Footer / actions ========== */
  .actions {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    margin-top: 36px;
  }
  button.btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    padding: 12px 22px;
    border-radius: 99px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform .08s ease, background .15s ease, border-color .15s ease, color .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  button.btn:active { transform: translateY(1px); }
  button.btn.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  button.btn.primary:hover { background: var(--accent-ink); }
  button.btn.ghost {
    background: transparent; color: var(--ink-soft); border-color: transparent;
  }
  button.btn.ghost:hover { color: var(--ink); }
  button.btn[disabled] { opacity: 0.45; cursor: not-allowed; transform: none; }
  .kbd-hint {
    font-size: 12px;
    color: var(--ink-mute);
    margin-left: auto;
    font-variant-numeric: tabular-nums;
  }
  .kbd-hint kbd {
    font-family: var(--serif); font-weight: 500; font-size: 12px;
    background: #fff;
    border: 1px solid var(--line-strong);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 1px 6px;
    margin: 0 2px;
    color: var(--ink-soft);
  }

  /* ========== Sectioned progress bar ========== */
  .progress-sections {
    display: flex; align-items: flex-end; gap: 6px; width: 100%;
  }
  .progress-segment {
    flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: stretch; gap: 3px;
    cursor: pointer;
    transition: opacity .15s;
  }
  .progress-segment:hover { opacity: 0.75; }
  .progress-segment.future { cursor: default; opacity: 0.5; }
  .progress-segment-label {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--ink-mute); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-weight: 500;
  }
  .progress-segment-bar {
    height: 3px; background: var(--line); border-radius: 99px; overflow: hidden;
  }
  .progress-segment-fill {
    height: 100%; background: var(--accent); border-radius: 99px;
    transition: width .35s cubic-bezier(.6,.0,.2,1);
    width: 0%;
  }
  .progress-segment.done .progress-segment-label { color: var(--accent-ink); }
  .progress-segment.active .progress-segment-label { color: var(--ink-soft); }

  /* ========== Custom field types ========== */
  /* Occupation search */
  .occ-search-wrap { position: relative; }
  .occ-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 20;
    background: #fff; border: 1px solid var(--accent); border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg); max-height: 260px; overflow-y: auto;
  }
  .occ-option {
    padding: 10px 16px; font-size: 15px; cursor: pointer; color: var(--ink);
    border-bottom: 1px solid var(--line);
  }
  .occ-option:last-child { border-bottom: none; }
  .occ-option:hover, .occ-option.focused { background: var(--accent-soft); }
  .occ-option mark { background: transparent; color: var(--accent-ink); font-weight: 600; }

  /* Sick pay */
  .sick-options { display: grid; gap: 10px; margin-top: 4px; }
  .sick-option { background: var(--bg-card); border: 1px solid var(--line-strong); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .sick-option-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; cursor: pointer; user-select: none; }
  .sick-option-header:hover { background: #fdfcf9; }
  .sick-check { width: 18px; height: 18px; border: 2px solid var(--line-strong); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .sick-option.selected .sick-check { background: var(--accent); border-color: var(--accent); }
  .sick-check svg { display: none; }
  .sick-option.selected .sick-check svg { display: block; }
  .sick-option.selected { border-color: var(--accent); }
  .sick-sub { padding: 0 16px 14px 46px; display: none; gap: 10px; }
  .sick-option.selected .sick-sub { display: flex; }
  .sick-sub-pair { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .sick-sub-pair label { font-size: 13px; color: var(--ink-soft); white-space: nowrap; }
  .sick-sub-pair input { width: 70px; }

  /* Work type */
  .work-type-grid { display: grid; gap: 14px; margin-top: 4px; }
  .work-type-row { background: var(--bg-card); border: 1px solid var(--line-strong); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .work-type-header { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }
  .work-type-label { flex: 1; font-size: 15px; color: var(--ink); }
  .work-type-desc { font-size: 12px; color: var(--ink-mute); }
  .pct-input-wrap { display: flex; align-items: center; gap: 6px; }
  .pct-input { width: 70px; text-align: right; }
  .pct-suffix { color: var(--ink-soft); font-size: 14px; }
  .work-type-detail { padding: 0 16px 14px; display: none; }
  .work-type-row.has-value .work-type-detail { display: block; }
  .pct-total { font-size: 13px; margin-top: 10px; }
  .pct-total.over { color: var(--warn); }
  .pct-total.ok { color: var(--accent-ink); }

  /* Mortgage page */
  .mortgage-grid { display: grid; gap: 18px; margin-top: 4px; }
  .mortgage-field { display: grid; gap: 6px; }
  .mortgage-label { font-size: 14px; font-weight: 500; color: var(--ink-soft); }
  .mortgage-check-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; cursor: pointer; user-select: none; }
  .mortgage-check-box { width: 16px; height: 16px; border: 2px solid var(--line-strong); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .mortgage-check-row.checked .mortgage-check-box { background: var(--accent); border-color: var(--accent); }
  .mortgage-check-label { font-size: 13px; color: var(--ink-soft); }

  /* Dependents widget */
  .dependents-list { display: grid; gap: 10px; margin-top: 4px; }
  .dependent-card { background: var(--bg-card); border: 1px solid var(--line-strong); border-radius: var(--radius-md); padding: 14px 16px; box-shadow: var(--shadow-sm); }
  .dependent-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .dependent-card-title { font-size: 14px; font-weight: 500; color: var(--ink-soft); }
  .dependent-remove { background: none; border: none; cursor: pointer; color: var(--ink-mute); font-size: 18px; padding: 0 4px; line-height: 1; }
  .dependent-remove:hover { color: var(--warn); }
  .dependent-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 500px) { .dependent-fields { grid-template-columns: 1fr; } }
  .dependent-field { display: grid; gap: 4px; }
  .dependent-field label { font-size: 12px; color: var(--ink-mute); }
  .dep-no-check { display: flex; align-items: center; gap: 10px; padding: 12px 0; cursor: pointer; user-select: none; border-top: 1px solid var(--line); margin-top: 8px; }
  .dep-no-box { width: 16px; height: 16px; border: 2px solid var(--line-strong); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .dep-no-check.checked .dep-no-box { background: var(--accent); border-color: var(--accent); }
  .dep-no-label { font-size: 14px; color: var(--ink-soft); }
  .stage > * { animation: enter .42s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes enter {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Splash */
  .splash {
    text-align: left;
    max-width: 600px;
  }
  .splash h1 {
    font-family: var(--serif);
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.022em;
    margin: 0 0 22px;
    color: var(--ink);
  }
  .splash h1 em { font-style: italic; }
  .splash p { color: var(--ink-soft); font-size: 17px; line-height: 1.65; margin: 0 0 12px; }
  .resume-banner {
    display: flex; align-items: center; gap: 12px;
    background: var(--accent-soft);
    border: 1px solid #cfdcd2;
    color: var(--accent-ink);
    padding: 14px 16px;
    border-radius: var(--radius-md);
    font-size: 14px;
    margin: 28px 0 0;
  }
  .resume-banner button { background: none; border: 1px solid var(--accent); color: var(--accent-ink); padding: 6px 12px; border-radius: 99px; font-size: 13px; cursor: pointer; font-family: var(--sans); }
  .resume-banner button:hover { background: var(--accent); color: #fff; }

  /* ========== Review layout ========== */
  .review-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
    align-items: start;
  }
  .review-content { min-width: 0; }
  .review-sidebar {
    display: none; /* hidden on mobile — button is fixed to bottom instead */
  }
  .review-submit-fixed {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    background: rgba(246,243,238,0.95);
    backdrop-filter: blur(8px) saturate(140%);
    border-top: 1px solid var(--line);
    padding: 14px 20px;
    display: flex; gap: 10px; align-items: center;
    box-shadow: 0 -8px 24px rgba(28,34,41,0.08);
  }
  .review-submit-fixed .btn.primary { flex: 1; justify-content: center; }
  .review-submit-fixed .btn.ghost { flex-shrink: 0; }
  /* push content clear of the fixed bar on mobile */
  .review-mobile-spacer { height: 80px; }

  @media (min-width: 760px) {
    .review-layout {
      grid-template-columns: 1fr 220px;
      gap: 32px;
    }
    .review-sidebar {
      display: block;
      position: sticky;
      top: 90px; /* clear the sticky header */
    }
    .review-sidebar-inner {
      display: flex; flex-direction: column; gap: 10px;
    }
    .review-submit-fixed { display: none; } /* use sidebar on desktop */
    .review-mobile-spacer { display: none; }
  }
    margin-top: 36px; padding-top: 24px; border-top: 1px solid var(--line);
  }
  .review-section:first-of-type { border-top: none; padding-top: 0; }
  .review-section h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    margin: 0 0 16px;
    letter-spacing: -0.01em;
    display: flex; align-items: baseline; justify-content: space-between; gap: 12px;
  }
  .review-section h3 .edit-btn {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--accent-ink);
    background: var(--accent-soft);
    border: 1px solid #cfdcd2;
    border-radius: 99px;
    padding: 3px 10px;
    cursor: pointer;
    text-decoration: none;
    flex-shrink: 0;
    white-space: nowrap;
    transition: background .15s;
  }
  .review-section h3 .edit-btn:hover { background: #d3e4d8; }
  .review-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 14px;
  }
  .review-row:last-child { border-bottom: none; }
  .review-q { color: var(--ink-soft); }
  .review-a { color: var(--ink); white-space: pre-wrap; word-break: break-word; }
  @media (max-width: 600px) { .review-row { grid-template-columns: 1fr; gap: 4px; } }

  /* Choice list in review */
  .review-choices { display: flex; flex-direction: column; gap: 5px; }
  .review-choice {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--ink-mute);
  }
  .review-choice.chosen { color: var(--ink); font-weight: 500; }
  .review-choice-marker {
    width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
    border: 1.5px solid var(--line-strong);
    display: flex; align-items: center; justify-content: center;
  }
  .review-choice.chosen .review-choice-marker {
    background: var(--accent); border-color: var(--accent);
  }
  .review-choice-marker svg { display: none; }
  .review-choice.chosen .review-choice-marker svg { display: block; }

  /* Ensure all question content is left-aligned */
  .card, .card *, .stage, .stage * {
    text-align: left;
  }
  /* Exceptions: checkbox markers, spinner, and thank-you screen stay centred */
  .review-choice-marker, .dep-no-box, .mortgage-check-box, .sick-check,
  .spinner, .center, .center * {
    text-align: center;
  }

  /* End / loading */
  .center {
    text-align: center; max-width: 480px;
    margin: 60px auto 0;
  }
  .center h2 {
    font-family: var(--serif);
    font-weight: 400;
    font-size: 32px;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  .center p { color: var(--ink-soft); margin: 0 0 22px; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="bar">
  <div class="bar-inner">
    <div class="bar-top">
      <div class="brand">
        <span class="lockup">Baker Hudson Health</span>
        <span class="sep">·</span>
        <span class="sub">Protection Fact Find</span>
      </div>
    </div>
    <div class="bar-progress">
      <div class="progress-sections" id="progressSections"></div>
    </div>
  </div>
</header>

<main>
  <div class="stage" id="stage">
    <div class="center">
      <div class="spinner"></div>
      <p>Loading your fact find…</p>
    </div>
  </div>
</main>

<script>
/* =====================================================================
 * Protection Fact Find — single-page form runtime
 *
 * Loads the unified schema (schema.json), renders one question at a time,
 * evaluates the original Typeform logic rules, validates and persists
 * answers locally, and submits to a configurable webhook.
 *
 * Configure the webhook URL by setting window.SUBMIT_URL before this
 * script loads, e.g. via a separate <script> tag or a query string.
 * ===================================================================== */

(function () {
  'use strict';

  // -------------------- Config --------------------
  const STORAGE_KEY = 'bhh_factfind_v1';
  const WEB3FORMS_KEY = (window.WEB3FORMS_KEY || '').trim();

  // -------------------- State --------------------
  let schema = null;
  let orderById = new Map();      // ref -> entry
  let positionById = new Map();   // ref -> integer position in `order`
  let logicBySource = new Map();  // source_ref -> rule
  let thankyouRefs = new Set();

  let answers = {};               // ref -> value (string | number | boolean | string[])
  let history = [];               // stack of refs for back-button
  let currentRef = null;          // ref of currently rendered entry
  let pendingValue = null;        // staged value before commit
  let _condCtx = null;            // active condition context for eyebrow badge inheritance

  function maybeSetCondCtxFromAnswer(entry, value) {
    // Only fire for condition-picker questions: Health/Lifestyle, no own prefix, choice answer.
    const cat = entry.section_category || '';
    if (entry.title_prefix) return;                         // already a sub-question
    if (cat !== 'Health' && cat !== 'Lifestyle') return;   // only relevant sections
    if (!value) return;

    const choices = entry.choices || [];
    const selected = Array.isArray(value) ? value : [value];
    const labels = selected
      .map(ref => choices.find(c => c.ref === ref))
      .filter(c => c && !isNoneOfAboveChoice(c) && c.label !== 'Yes' && c.label !== 'No')
      .map(c => c.label);

    if (labels.length > 0) _condCtx = labels.join(', ');
  }

  // -------------------- Boot --------------------
  document.addEventListener('keydown', onGlobalKey);
  loadSchema();

  async function loadSchema() {
    try {
      const r = await fetch('schema.json', { cache: 'no-store' });
      if (!r.ok) throw new Error('Failed to load schema.json (' + r.status + ')');
      schema = await r.json();
      indexSchema();
      restoreOrSplash();
    } catch (err) {
      stage().innerHTML = `<div class="center"><h2>Sorry — couldn't load the form</h2><p>${escapeHtml(err.message)}</p></div>`;
    }
  }

  function indexSchema() {
    schema.order.forEach((e, i) => {
      orderById.set(e.ref, e);
      positionById.set(e.ref, i);
    });
    schema.logic.forEach(rule => logicBySource.set(rule.source_ref, rule));
    (schema.thankyou_refs || []).forEach(r => thankyouRefs.add(r));
  }

  // -------------------- Persistence --------------------
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        answers, history, currentRef, savedAt: Date.now(),
      }));
    } catch (_) { /* storage may be disabled */ }
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (_) { return null; }
  }
  function clearState() {
    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
  }

  function restoreOrSplash() {
    const saved = loadState();
    if (saved && saved.currentRef && saved.savedAt && (Date.now() - saved.savedAt < 1000 * 60 * 60 * 24 * 14)) {
      renderSplash(saved);
    } else {
      renderSplash(null);
    }
  }

  // -------------------- Splash / start --------------------
  function renderSplash(saved) {
    const startable = schema.order.find(e => e.kind !== 'section' || true) || schema.order[0];
    const hours = saved ? Math.round((Date.now() - saved.savedAt) / 3600000) : 0;
    stage().innerHTML = `
      <div class="splash">
        <span class="eyebrow"><span class="dot"></span>Protection fact find</span>
        <h1>Let's get the questions <em>out of the way</em>.</h1>
        <p>This form gathers everything insurers need to assess an application for life cover, critical illness cover or income protection.</p>
        <p>Most clients take 20–30 minutes. Your progress saves automatically as you go, so you can stop and pick up later on the same device.</p>
        <p>Have your bank details and recent health information to hand if you can.</p>
        <div class="actions">
          <button class="btn primary" id="startBtn">Begin <span aria-hidden="true">→</span></button>
        </div>
        ${saved ? `
          <div class="resume-banner">
            <span>You started this form ${hours === 0 ? 'recently' : `${hours} hour${hours === 1 ? '' : 's'} ago`}. Resume from where you left off?</span>
            <button id="resumeBtn">Resume</button>
            <button id="restartBtn" style="border-color:var(--line-strong);color:var(--ink-soft)">Start over</button>
          </div>` : ''}
      </div>`;
    document.getElementById('startBtn').addEventListener('click', () => {
      answers = {}; history = []; _condCtx = null; clearState();
      goTo(schema.order[0].ref);
    });
    if (saved) {
      document.getElementById('resumeBtn').addEventListener('click', () => {
        answers = saved.answers || {};
        history = saved.history || [];
        goTo(saved.currentRef);
      });
      document.getElementById('restartBtn').addEventListener('click', () => {
        if (!confirm('Start the form over from the beginning? Your existing answers will be cleared.')) return;
        clearState();
        renderSplash(null);
      });
    }
    setProgress(null);
  }

  // -------------------- Navigation --------------------
  function goTo(ref) {
    if (ref == null) return finish();
    const entry = orderById.get(ref);
    if (!entry) {
      // Target was removed from schema — find next valid sequential entry
      const pos = schema.order.findIndex(e => e.ref === ref);
      const next = pos >= 0 ? schema.order.slice(pos + 1).find(e => orderById.has(e.ref)) : null;
      return next ? goTo(next.ref) : finish();
    }
    currentRef = ref;
    pendingValue = (entry.kind === 'field') ? cloneValue(answers[ref]) : null;
    saveState();
    renderEntry(entry);
    setProgress(ref);
  }

  function pushHistoryAndGo(targetRef) {
    if (currentRef) history.push(currentRef);
    goTo(targetRef);
  }

  function back() {
    const prev = history.pop();
    if (prev) goTo(prev);
  }

  function next() {
    const entry = orderById.get(currentRef);
    if (!entry) return;
    if (entry.kind === 'field') {
      const ok = validateAndStage(entry);
      if (!ok) return;
      answers[currentRef] = pendingValue;
      // If this is a condition-picker (no own prefix, Health/Lifestyle, choice answer),
      // capture the selected label(s) so un-prefixed follow-up questions inherit the badge.
      maybeSetCondCtxFromAnswer(entry, pendingValue);
    } else if (entry.kind === 'page') {
      const ok = validatePage(entry);
      if (!ok) return;
    } else if (entry.kind === 'custom') {
      const ok = validateCustom(entry);
      if (!ok) return;
    } else if (entry.kind === 'field' && entry.ui_hint === 'occupation_search') {
      if (entry.required && !pendingValue) {
        const e = document.getElementById('err');
        if (e) { e.textContent = 'Please select an occupation.'; e.classList.add('show'); }
        return;
      }
      answers[currentRef] = pendingValue;
    }
    saveState();
    const target = resolveJump(entry);
    if (target == null) return finish();
    pushHistoryAndGo(target);
  }

  function validateCustom(entry) {
    const errEl = document.getElementById('err');
    if (errEl) errEl.classList.remove('show');
    function fail(msg) {
      if (errEl) { errEl.textContent = msg; errEl.classList.add('show'); }
      return false;
    }
    if (entry.custom_type === 'work_type') {
      let total = 0;
      stage().querySelectorAll('[data-pct]').forEach(inp => { total += Number(inp.value) || 0; });
      if (total !== 100) return fail(`Percentages must add up to 100% (currently ${total}%). Please adjust.`);
    }
    if (entry.custom_type === 'dependents') {
      const val = answers[entry.ref];
      if (!val || (!val.none && (!val.dependents || val.dependents.length === 0))) {
        return fail('Please add at least one dependent, or tick "No financial dependents".');
      }
    }
    return true;
  }

  // -------------------- Logic engine --------------------
  function resolveJump(entry) {
    const rule = logicBySource.get(entry.ref);
    if (rule) {
      for (const action of rule.actions) {
        if (evalCondition(action.condition)) {
          const target = resolveJumpTarget(action.target_ref, entry.part);
          // If the target was a deleted/internal field, skip this action and continue
          // evaluating subsequent rules (eventually falling through to sequential order).
          if (target != null && orderById.has(target)) return target;
          if (target == null && !isThankyouLike(action.target_ref)) continue;
          if (target == null) return null; // thankyou → finish
        }
      }
    }
    // Fall through to the next entry in document order
    const pos = positionById.get(entry.ref);
    if (pos == null) return null;
    if (pos + 1 >= schema.order.length) return null;
    return schema.order[pos + 1].ref;
  }

  function isThankyouLike(ref) {
    return thankyouRefs.has(ref) || ref === 'default_tys' || (typeof ref === 'string' && ref.startsWith('default_'));
  }

  function resolveJumpTarget(targetRef, sourcePart) {
    if (isThankyouLike(targetRef)) {
      for (const e of schema.order) {
        if (e.part > sourcePart) return e.ref;
      }
      return null;
    }
    // If the target no longer exists (e.g. was an absorbed sub-question), return null
    // so the caller can fall through to the next action or sequential order.
    if (!orderById.has(targetRef)) return null;
    return targetRef;
  }

  function evalCondition(cond) {
    if (!cond || !cond.op) return false;
    const op = cond.op;
    if (op === 'always') return true;
    const vars = cond.vars || [];

    if (op === 'and' || op === 'or') {
      const subs = vars.map(v => v.type === 'op' ? evalCondition(v.value) : false);
      return op === 'and' ? subs.every(Boolean) : subs.some(Boolean);
    }

    // For binary ops: var[0] is field, var[1] is choice/constant
    const left = readVar(vars[0]);
    const right = readVar(vars[1]);

    if (op === 'is' || op === 'equal') {
      // For multi-select arrays: 'is' means "answer contains the value"
      if (Array.isArray(left)) return left.includes(right);
      // Boolean and string comparisons
      if (typeof right === 'boolean' || typeof left === 'boolean') {
        return Boolean(left) === Boolean(right);
      }
      // Numeric coercion if both look numeric
      if (looksNumeric(left) && looksNumeric(right)) return Number(left) === Number(right);
      return String(left) === String(right);
    }
    if (op === 'greater_than') return numeric(left) > numeric(right);
    if (op === 'lower_than') return numeric(left) < numeric(right);
    if (op === 'greater_equal_than') return numeric(left) >= numeric(right);
    if (op === 'lower_equal_than') return numeric(left) <= numeric(right);
    if (op === 'not_equal') return String(left) !== String(right);
    if (op === 'contains') return String(left ?? '').toLowerCase().includes(String(right ?? '').toLowerCase());
    if (op === 'begins_with') return String(left ?? '').toLowerCase().startsWith(String(right ?? '').toLowerCase());
    if (op === 'ends_with') return String(left ?? '').toLowerCase().endsWith(String(right ?? '').toLowerCase());
    return false;
  }

  function readVar(v) {
    if (!v) return null;
    if (v.type === 'field') return answers[v.value];
    if (v.type === 'choice') return v.value;
    if (v.type === 'constant') return v.value;
    return null;
  }
  function looksNumeric(v) { return v !== null && v !== undefined && v !== '' && !isNaN(Number(v)); }
  function numeric(v) { return Number(v); }

  // -------------------- Rendering --------------------
  function stage() { return document.getElementById('stage'); }

  function renderEntry(entry) {
    // Update condition context for eyebrow badge inheritance
    if (entry.kind === 'section') {
      _condCtx = null;                        // section boundary resets context
    } else if (entry.title_prefix) {
      _condCtx = entry.title_prefix;          // explicit prefix sets new context
    }

    if (entry.kind === 'section' || entry.kind === 'composite_label') {
      renderSection(entry);
    } else if (entry.kind === 'display') {
      renderDisplay(entry);
    } else if (entry.kind === 'page') {
      renderPage(entry);
    } else if (entry.kind === 'custom') {
      renderCustom(entry);
    } else if (entry.kind === 'field' && entry.ui_hint === 'occupation_search') {
      renderOccupationSearch(entry);
    } else if (entry.kind === 'field') {
      renderField(entry);
    } else {
      renderField(entry);
    }
  }

  function renderSection(entry) {
    const eyebrowLabel = entry.section_category || 'Personal & Occupation';
    stage().innerHTML = `
      <div class="card">
        ${eyebrow(entry, eyebrowLabel)}
        <h1 class="q-title">${formatTitle(entry.title)}</h1>
        ${entry.description ? `<div class="info-card">${formatTitle(entry.description)}</div>` : ''}
        ${navActions(false, 'Continue')}
      </div>`;
    wireNav();
  }

  function renderDisplay(entry) {
    stage().innerHTML = `
      <div class="card">
        ${eyebrow(entry, entry.section_category || 'Health')}
        <h1 class="q-title">${formatTitle(entry.title)}</h1>
        ${entry.description ? `<p class="q-desc">${formatTitle(entry.description)}</p>` : ''}
        ${navActions(false, 'Continue')}
      </div>`;
    wireNav();
  }

  function renderPage(entry) {
    // Multi-question page — multiple subfields rendered together on one screen.
    // Mirrors how Typeform rendered contact_info and inline_group containers.
    const subfields = entry.subfields || [];
    const subfieldHtml = subfields.map((sf, i) => renderSubfield(sf, i)).join('');

    stage().innerHTML = `
      <div class="card">
        ${eyebrow(entry, entry.section_category || 'Health')}
        <h1 class="q-title">${formatTitle(entry.title)}</h1>
        ${entry.description ? `<p class="q-desc">${formatTitle(entry.description)}</p>` : ''}
        <div class="subfields">${subfieldHtml}</div>
        <div class="error-msg" id="err"></div>
        ${navActions(true, 'Continue')}
      </div>`;

    wireNav();
    wirePageInputs(entry);
    const first = stage().querySelector('input, select, textarea');
    if (first) setTimeout(() => { try { first.focus({ preventScroll: false }); } catch {} }, 60);
  }

  function renderSubfield(sf, idx) {
    const inputId = 'sub_' + idx;
    const stored = answers[sf.ref];
    let inputHtml = '';

    if (sf.type === 'short_text' || sf.type === 'email' || sf.type === 'phone_number') {
      const inputType = sf.type === 'email' ? 'email' : sf.type === 'phone_number' ? 'tel' : 'text';
      const v = stored ?? '';
      inputHtml = `<input class="input" id="${inputId}" data-ref="${escapeAttr(sf.ref)}" data-type="${escapeAttr(sf.type)}" type="${inputType}" autocomplete="${autocompleteFor(sf)}" value="${escapeAttr(v)}" />`;
    } else if (sf.type === 'long_text') {
      const v = stored ?? '';
      inputHtml = `<textarea class="input" id="${inputId}" data-ref="${escapeAttr(sf.ref)}" data-type="${escapeAttr(sf.type)}" rows="3">${escapeHtml(v)}</textarea>`;
    } else if (sf.type === 'number') {
      const v = (stored === undefined || stored === null) ? '' : stored;
      inputHtml = `<input class="input" id="${inputId}" data-ref="${escapeAttr(sf.ref)}" data-type="${escapeAttr(sf.type)}" type="number" inputmode="decimal" value="${escapeAttr(v)}" />`;
    } else {
      // Fallback — should be rare since contact_info/inline_group only contain text/number/email/phone
      const v = stored ?? '';
      inputHtml = `<input class="input" id="${inputId}" data-ref="${escapeAttr(sf.ref)}" data-type="${escapeAttr(sf.type || '')}" type="text" value="${escapeAttr(v)}" />`;
    }

    return `
      <div class="subfield-row">
        <label class="sub-label" for="${inputId}">${formatTitle(sf.title)}${sf.required ? '<span class="q-required">*</span>' : ''}</label>
        ${inputHtml}
      </div>`;
  }

  function wirePageInputs(entry) {
    // Commit each subfield's value directly to answers as the user types,
    // so progress is preserved if they navigate back/forward.
    stage().querySelectorAll('[data-ref]').forEach(el => {
      el.addEventListener('input', () => {
        const ref = el.dataset.ref;
        const type = el.dataset.type;
        let v = el.value;
        if (type === 'number') v = (v === '' ? '' : Number(v));
        answers[ref] = v;
        el.classList.remove('error-input');
      });
    });
  }

  function validatePage(entry) {
    const errEl = document.getElementById('err');
    if (errEl) errEl.classList.remove('show');

    const missing = [];
    let firstInvalid = null;

    for (const sf of (entry.subfields || [])) {
      const el = stage().querySelector(`[data-ref="${sf.ref}"]`);
      if (el) el.classList.remove('error-input');
      const v = answers[sf.ref];
      const empty = v === undefined || v === null || v === '' || (Array.isArray(v) && v.length === 0);

      if (sf.required && empty) {
        missing.push(stripFormatting(sf.title));
        if (el) el.classList.add('error-input');
        if (!firstInvalid) firstInvalid = el;
        continue;
      }
      if (!empty && sf.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
        missing.push(stripFormatting(sf.title) + ' (invalid email)');
        if (el) el.classList.add('error-input');
        if (!firstInvalid) firstInvalid = el;
      }
      if (!empty && sf.type === 'number' && isNaN(Number(v))) {
        missing.push(stripFormatting(sf.title) + ' (must be a number)');
        if (el) el.classList.add('error-input');
        if (!firstInvalid) firstInvalid = el;
      }
    }

    if (missing.length > 0) {
      if (errEl) {
        errEl.textContent = (missing.length === 1 ? 'Please complete: ' : 'Please complete these fields: ') + missing.join(', ');
        errEl.classList.add('show');
      }
      if (firstInvalid) firstInvalid.focus();
      return false;
    }
    return true;
  }

  // ── Occupation search combobox ──────────────────────────────────────────────
  function renderOccupationSearch(entry) {
    const stored = answers[entry.ref] || '';
    const storedLabel = stored && schema.choice_index[stored] ? schema.choice_index[stored].label : stored;
    stage().innerHTML = `
      <div class="card">
        ${eyebrow(entry, entry.section_category || 'Health')}
        <h1 class="q-title">${formatTitle(entry.title)}${entry.required ? '<span class="q-required">*</span>' : ''}</h1>
        ${entry.description ? `<p class="q-desc">${formatTitle(entry.description)}</p>` : ''}
        <div class="field occ-search-wrap">
          <input class="input" id="occInput" type="text" autocomplete="off" placeholder="Type to search…" value="${escapeAttr(storedLabel)}" />
          <div class="occ-dropdown" id="occDropdown" style="display:none"></div>
          <input type="hidden" id="occValue" value="${escapeAttr(stored)}" />
        </div>
        <div class="error-msg" id="err"></div>
        ${navActions(true, 'Continue')}
      </div>`;
    wireNav();
    pendingValue = stored || null;

    const inp = document.getElementById('occInput');
    const drop = document.getElementById('occDropdown');
    const hidden = document.getElementById('occValue');
    let focusedIdx = -1;
    const choices = entry.choices || [];

    function render(q) {
      const lower = q.toLowerCase();
      const matches = q.length < 2 ? [] : choices.filter(c => c.label.toLowerCase().includes(lower)).slice(0, 40);
      if (!matches.length) { drop.style.display = 'none'; return; }
      drop.innerHTML = matches.map((c, i) => {
        const hi = c.label.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
        return `<div class="occ-option" data-ref="${escapeAttr(c.ref)}" data-idx="${i}">${hi}</div>`;
      }).join('');
      drop.style.display = 'block';
      focusedIdx = -1;
      drop.querySelectorAll('.occ-option').forEach(opt => {
        opt.addEventListener('mousedown', e => {
          e.preventDefault();
          select(opt.dataset.ref, opt.textContent);
        });
      });
    }

    function select(ref, label) {
      inp.value = choices.find(c => c.ref === ref)?.label || label;
      hidden.value = ref;
      pendingValue = ref;
      drop.style.display = 'none';
    }

    inp.addEventListener('input', () => { render(inp.value); hidden.value = ''; pendingValue = null; });
    inp.addEventListener('keydown', e => {
      const opts = [...drop.querySelectorAll('.occ-option')];
      if (e.key === 'ArrowDown') { e.preventDefault(); focusedIdx = Math.min(focusedIdx+1, opts.length-1); opts.forEach((o,i) => o.classList.toggle('focused', i===focusedIdx)); if (opts[focusedIdx]) opts[focusedIdx].scrollIntoView({block:'nearest'}); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); focusedIdx = Math.max(focusedIdx-1, 0); opts.forEach((o,i) => o.classList.toggle('focused', i===focusedIdx)); }
      else if (e.key === 'Enter' && focusedIdx >= 0 && opts[focusedIdx]) { e.preventDefault(); select(opts[focusedIdx].dataset.ref, opts[focusedIdx].textContent); }
    });
    inp.addEventListener('blur', () => setTimeout(() => { drop.style.display = 'none'; }, 150));
    setTimeout(() => inp.focus(), 60);
  }

  // ── Dispatch custom field types ──────────────────────────────────────────────
  function renderCustom(entry) {
    if (entry.custom_type === 'sick_pay')     renderSickPay(entry);
    else if (entry.custom_type === 'work_type')    renderWorkType(entry);
    else if (entry.custom_type === 'mortgage_page') renderMortgagePage(entry);
    else if (entry.custom_type === 'dependents')   renderDependents(entry);
    else renderField({...entry, kind:'field', type:'short_text'});
  }

  // ── Sick pay custom page ──────────────────────────────────────────────────────
  function renderSickPay(entry) {
    const stored = (typeof answers[entry.ref] === 'object' && answers[entry.ref]) ? answers[entry.ref] : {};
    const OPTS = [
      { key: 'employer', label: 'Employer sick pay scheme', hasSub: true },
      { key: 'ssp', label: 'Statutory Sick Pay (SSP)' },
      { key: 'other', label: 'Other' },
      { key: 'unsure', label: 'Unsure' },
    ];
    function mkCheck(k) { return stored[k] ? 'selected' : ''; }

    const optHtml = OPTS.map(o => `
      <div class="sick-option ${mkCheck(o.key)}" data-key="${o.key}">
        <div class="sick-option-header">
          <div class="sick-check"><svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span>${escapeHtml(o.label)}</span>
        </div>
        ${o.hasSub ? `<div class="sick-sub">
          <div class="sick-sub-pair">
            <label>Full pay:</label>
            <input class="input pct-input" type="number" min="0" max="52" id="sick_full" value="${escapeAttr(stored.full_months||'')}"> <span class="pct-suffix">months</span>
          </div>
          <div class="sick-sub-pair">
            <label>Half pay:</label>
            <input class="input pct-input" type="number" min="0" max="52" id="sick_half" value="${escapeAttr(stored.half_months||'')}"> <span class="pct-suffix">months</span>
          </div>
        </div>` : ''}
      </div>`).join('');

    stage().innerHTML = `
      <div class="card">
        ${eyebrow(entry, entry.section_category || 'Health')}
        <h1 class="q-title">${formatTitle(entry.title)}</h1>
        <p class="q-desc">Select all that apply.</p>
        <div class="sick-options">${optHtml}</div>
        <div class="error-msg" id="err"></div>
        ${navActions(true, 'Continue')}
      </div>`;
    wireNav();

    function save() {
      const val = {};

  function renderField(entry) {
    const ftype = entry.type;
    let inputHtml = '';

    if (ftype === 'short_text' || ftype === 'email' || ftype === 'phone_number') {
      const inputType = ftype === 'email' ? 'email' : ftype === 'phone_number' ? 'tel' : 'text';
      const v = pendingValue ?? '';
      inputHtml = `<input class="input" id="inp" type="${inputType}" autocomplete="${autocompleteFor(entry)}" value="${escapeAttr(v)}" />`;
    } else if (ftype === 'long_text') {
      const v = pendingValue ?? '';
      inputHtml = `<textarea class="input" id="inp" rows="5">${escapeHtml(v)}</textarea>`;
    } else if (ftype === 'number') {
      const v = (pendingValue === undefined || pendingValue === null) ? '' : pendingValue;
      inputHtml = `<input class="input" id="inp" type="number" inputmode="decimal" value="${escapeAttr(v)}" />`;
    } else if (ftype === 'date') {
      const v = pendingValue ?? '';
      inputHtml = `<input class="input" id="inp" type="date" value="${escapeAttr(v)}" />`;
    } else if (ftype === 'yes_no') {
      const sel = pendingValue;
      inputHtml = `
        <div class="choices yesno" id="choiceGroup" data-multi="false">
          <button type="button" class="choice ${sel === true ? 'selected' : ''}" data-val="true">
            <span class="key">Y</span><span class="label">Yes</span>
          </button>
          <button type="button" class="choice ${sel === false ? 'selected' : ''}" data-val="false">
            <span class="key">N</span><span class="label">No</span>
          </button>
        </div>`;
    } else if (ftype === 'multiple_choice') {
      const multi = !!entry.allow_multiple_selection;
      const sel = multi ? (Array.isArray(pendingValue) ? pendingValue : []) : pendingValue;
      const buttons = entry.choices.map((c, i) => {
        const active = multi ? sel.includes(c.ref) : sel === c.ref;
        const keyChar = i < 9 ? String(i + 1) : (i < 35 ? String.fromCharCode(65 + i - 9) : '·');
        return `<button type="button" class="choice ${active ? 'selected' : ''}" data-val="${escapeAttr(c.ref)}">
                  <span class="key">${keyChar}</span><span class="label">${formatTitle(c.label)}</span>
                </button>`;
      }).join('');
      const hint = multi
        ? '<div class="helper">Select all that apply, then click Continue. Choosing "None of the above" will progress automatically.</div>'
        : '';
      inputHtml = `<div class="choices" id="choiceGroup" data-multi="${multi}">${buttons}</div>${hint}`;
    } else if (ftype === 'dropdown') {
      const v = pendingValue ?? '';
      const opts = ['<option value="">— Select —</option>']
        .concat(entry.choices.map(c => `<option value="${escapeAttr(c.ref)}" ${c.ref === v ? 'selected' : ''}>${escapeHtml(c.label)}</option>`))
        .join('');
      inputHtml = `<select class="input" id="inp">${opts}</select>`;
    } else {
      inputHtml = `<div class="info-card">[Unsupported field type: ${escapeHtml(ftype)}] — please contact your adviser.</div>`;
    }

    stage().innerHTML = `
      <div class="card">
        ${eyebrow(entry, entry.section_category || 'Health')}
        <h1 class="q-title">${formatTitle(entry.title)}${entry.required ? '<span class="q-required">*</span>' : ''}</h1>
        ${entry.description ? `<p class="q-desc">${formatTitle(entry.description)}</p>` : ''}
        <div class="field">${inputHtml}</div>
        <div class="error-msg" id="err"></div>
        ${navActions(true, 'Continue')}
      </div>`;

    wireNav();
    wireFieldInputs(entry);
    const inp = document.getElementById('inp');
    if (inp) setTimeout(() => { try { inp.focus({ preventScroll: false }); } catch {} }, 60);
  }

  function navActions(showBack, ctaText) {
    return `
      <div class="actions">
        <button class="btn primary" id="nextBtn">${escapeHtml(ctaText)} <span aria-hidden="true">→</span></button>
        ${history.length > 0 ? '<button class="btn ghost" id="backBtn">← Back</button>' : ''}
        <span class="kbd-hint">Press <kbd>Enter</kbd> to continue</span>
      </div>`;
  }

  function wireNav() {
    const nb = document.getElementById('nextBtn');
    if (nb) nb.addEventListener('click', next);
    const bb = document.getElementById('backBtn');
    if (bb) bb.addEventListener('click', back);
  }

  function wireFieldInputs(entry) {
    const inp = document.getElementById('inp');
    if (inp) {
      inp.addEventListener('input', () => {
        if (entry.type === 'number') pendingValue = inp.value === '' ? '' : Number(inp.value);
        else pendingValue = inp.value;
      });
      inp.addEventListener('change', () => {
        if (entry.type === 'dropdown') pendingValue = inp.value;
      });
    }
    const cg = document.getElementById('choiceGroup');
    if (cg) {
      const multi = cg.dataset.multi === 'true';
      cg.querySelectorAll('.choice').forEach(btn => {
        btn.addEventListener('click', () => {
          let raw = btn.dataset.val;
          let val = raw === 'true' ? true : raw === 'false' ? false : raw;
          if (multi) {
            if (!Array.isArray(pendingValue)) pendingValue = [];
            const clickedIsNone = isNoneOfAboveRef(entry, val);

            if (clickedIsNone) {
              // Selecting "None" replaces the entire selection and auto-advances
              pendingValue = [val];
              cg.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));
              btn.classList.add('selected');
              setTimeout(next, 180);
              return;
            }

            // Selecting any other option clears any existing "None" selection
            pendingValue = pendingValue.filter(v => !isNoneOfAboveRef(entry, v));
            cg.querySelectorAll('.choice').forEach(b => {
              if (isNoneOfAboveRef(entry, b.dataset.val)) b.classList.remove('selected');
            });

            // Toggle the clicked option
            const idx = pendingValue.indexOf(val);
            if (idx === -1) { pendingValue.push(val); btn.classList.add('selected'); }
            else { pendingValue.splice(idx, 1); btn.classList.remove('selected'); }
          } else {
            cg.querySelectorAll('.choice').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            pendingValue = val;
            // For Yes/No and single-choice, advance immediately for snappy UX
            if (entry.type === 'yes_no' || (entry.type === 'multiple_choice' && !multi)) {
              setTimeout(next, 180);
            }
          }
        });
      });
    }
  }

  function validateAndStage(entry) {
    const errEl = document.getElementById('err');
    function fail(msg) {
      if (errEl) { errEl.textContent = msg; errEl.classList.add('show'); }
      return false;
    }
    if (errEl) errEl.classList.remove('show');

    if (!entry.required) return true;
    const v = pendingValue;
    const empty = v === undefined || v === null || v === '' || (Array.isArray(v) && v.length === 0);
    if (empty) return fail('Please answer this question to continue.');
    if (entry.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return fail('Please enter a valid email address.');
    if (entry.type === 'number' && isNaN(Number(v))) return fail('Please enter a number.');
    return true;
  }

  // -------------------- Finish / review --------------------
  function finish() {
    setProgress(null);
    const groups = buildReviewGroups();
    const sections = groups.map((g, gi) => `
      <div class="review-section">
        <h3>${escapeHtml(g.title)}<button class="edit-btn" data-gi="${gi}">Edit</button></h3>
        ${g.rows.length === 0
          ? '<p style="color:var(--ink-mute);font-size:14px">No answers in this section.</p>'
          : g.rows.map(r => `
              <div class="review-row">
                <div class="review-q">${formatTitle(r.q)}</div>
                <div class="review-a">${renderReviewAnswer(r)}</div>
              </div>`).join('')}
      </div>`).join('');

    stage().innerHTML = `
      <div class="card">
        <span class="eyebrow"><span class="dot"></span>Review &amp; submit</span>
        <h1 class="q-title">Almost <em>done</em>.</h1>
        <p class="q-desc">Please review your answers below. If anything needs changing, use the back button — your other answers will be kept.</p>
        <div class="review-layout">
          <div class="review-content">
            ${sections}
            <div id="submitErr" class="error-msg" style="margin-top:16px"></div>
          </div>
          <div class="review-sidebar">
            <div class="review-sidebar-inner">
              <button class="btn primary" id="submitBtnDesk">Submit fact find <span aria-hidden="true">→</span></button>
              <button class="btn ghost" id="backBtnDesk" style="justify-content:center">← Back</button>
            </div>
          </div>
        </div>
        <div class="review-mobile-spacer"></div>
      </div>
      <div class="review-submit-fixed">
        <button class="btn ghost" id="backBtnMob">← Back</button>
        <button class="btn primary" id="submitBtnMob">Submit fact find →</button>
      </div>`;

    document.getElementById('backBtnDesk')?.addEventListener('click', back);
    document.getElementById('backBtnMob')?.addEventListener('click', back);
    document.getElementById('submitBtnDesk')?.addEventListener('click', onSubmit);
    document.getElementById('submitBtnMob')?.addEventListener('click', onSubmit);

    // Edit buttons — jump to the first answerable entry in that review section
    stage().querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const gi = Number(btn.dataset.gi);
        const group = groups[gi];
        if (!group) return;
        // Find the first schema entry whose ref is in this group
        const rowRefs = new Set((group.rows || []).map(r => r.ref).filter(Boolean));
        // Also check page subfields
        for (const e of schema.order) {
          if (rowRefs.has(e.ref)) {
            history.push(currentRef);
            goTo(e.ref);
            return;
          }
          if (e.kind === 'page' || e.kind === 'custom') {
            // If any subfield ref is in rowRefs, navigate to the page
            const subRefs = (e.subfields || []).map(s => s.ref);
            if (subRefs.some(r => rowRefs.has(r))) {
              history.push(currentRef);
              goTo(e.ref);
              return;
            }
          }
        }
        // Fallback: navigate to first entry with matching section title
        for (const e of schema.order) {
          const scat = e.section_category || '';
          if (scat.toLowerCase() === (group.title || '').toLowerCase()) {
            history.push(currentRef);
            goTo(e.ref);
            return;
          }
        }
      });
    });
  }

  function buildReviewGroups() {
    const groups = [];
    let current = null;
    let lastPart = null;
    for (const entry of schema.order) {
      if (entry.kind === 'section') {
        current = { title: stripFormatting(resolveTemplates(entry.title)), rows: [] };
        groups.push(current);
        lastPart = entry.part;
      } else if (entry.kind === 'page') {
        current = { title: stripFormatting(resolveTemplates(entry.title)), rows: [] };
        groups.push(current);
        lastPart = entry.part;
        for (const sf of (entry.subfields || [])) {
          const v = answers[sf.ref];
          if (v !== undefined && v !== null && v !== '') {
            current.rows.push({ q: stripFormatting(sf.title), a: v, ref: sf.ref, type: sf.type });
          }
        }
      } else if (entry.kind === 'custom') {
        // Custom fields produce their own section heading + structured rows
        const a = answers[entry.ref];
        if (a !== undefined && a !== null) {
          if (!current || lastPart !== entry.part) {
            current = { title: `Part ${entry.part}`, rows: [] };
            groups.push(current);
            lastPart = entry.part;
          }
          const rows = renderCustomReviewRows(entry, a);
          current.rows.push(...rows);
        }
      } else if (entry.kind === 'field' && answers[entry.ref] !== undefined && answers[entry.ref] !== null && answers[entry.ref] !== '') {
        if (!current || lastPart !== entry.part) {
          current = { title: `Part ${entry.part}`, rows: [] };
          groups.push(current);
          lastPart = entry.part;
        }
        current.rows.push({ q: stripFormatting(entry.title), a: answers[entry.ref], ref: entry.ref, type: entry.type, choices: entry.choices || [], ui_hint: entry.ui_hint || '' });
      }
    }
    return groups.filter(g => g.rows.length > 0);
  }

  function renderCustomReviewRows(entry, val) {
    const rows = [];
    if (!val || typeof val !== 'object') {
      rows.push({ q: stripFormatting(entry.title), a: String(val||'') });
      return rows;
    }
    if (entry.custom_type === 'sick_pay') {
      const labels = { employer:'Employer sick pay', ssp:'Statutory Sick Pay', other:'Other', unsure:'Unsure' };
      const selected = Object.keys(labels).filter(k => val[k]);
      rows.push({ q: 'Sick pay arrangements', a: selected.map(k => labels[k]).join(', ') || 'None selected' });
      if (val.employer && (val.full_months || val.half_months)) {
        rows.push({ q: 'Employer scheme detail', a: `${val.full_months||0} months full pay, ${val.half_months||0} months half pay` });
      }
    } else if (entry.custom_type === 'work_type') {
      const TYPES = [
        {key:'admin',label:'Administrative'},{key:'super',label:'Supervisory'},
        {key:'light',label:'Light manual'},{key:'heavy',label:'Heavy manual'},
      ];
      TYPES.forEach(t => {
        if (val[t.key+'_pct'] && Number(val[t.key+'_pct']) > 0) {
          rows.push({ q: `${t.label} work`, a: `${val[t.key+'_pct']}%` });
          if (val[t.key+'_detail']) rows.push({ q: `${t.label} work — details`, a: val[t.key+'_detail'] });
        }
      });
    } else if (entry.custom_type === 'mortgage_page') {
      if (val.balance)    rows.push({ q: 'Outstanding mortgage balance', a: `£${val.balance}` });
      if (val.years)      rows.push({ q: 'Years remaining', a: val.years });
      if (val.payment)    rows.push({ q: 'Monthly payment', a: `£${val.payment}` });
      if (val.rate)       rows.push({ q: 'Interest rate', a: `${val.rate}%` });
      if (val.rate_type)  rows.push({ q: 'Rate type', a: val.rate_type });
      if (val.deal_end)   rows.push({ q: 'Deal end date', a: val.deal_end });
      if (val.repay_type) rows.push({ q: 'Repayment type', a: val.repay_type });
      const cov = [val.covered_life && 'Life insurance', val.covered_ci && 'Critical illness', val.covered_ip && 'Income protection'].filter(Boolean);
      if (cov.length) rows.push({ q: 'Currently covered by', a: cov.join(', ') });
    } else if (entry.custom_type === 'dependents') {
      if (val.none) {
        rows.push({ q: 'Financial dependents', a: 'None' });
      } else {
        (val.dependents || []).forEach((d, i) => {
          rows.push({ q: `Dependent ${i+1}`, a: [d.name, d.dob, d.rel].filter(Boolean).join(' · ') || 'Details incomplete' });
        });
        if (!val.dependents?.length) rows.push({ q: 'Financial dependents', a: 'Not answered' });
      }
    }
    return rows;
  }

  const CHECK_SVG = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  function renderReviewAnswer(r) {
    const { a, type, choices, ui_hint } = r;

    // Yes/No — always show both options
    if (type === 'yes_no') {
      return `<div class="review-choices">
        ${['Yes','No'].map(opt => {
          const chosen = (opt === 'Yes' && a === true) || (opt === 'No' && a === false);
          return `<div class="review-choice ${chosen ? 'chosen' : ''}">
            <div class="review-choice-marker">${chosen ? CHECK_SVG : ''}</div>
            <span>${opt}</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    // Occupation search — hundreds of options, just show what was picked
    if (ui_hint === 'occupation_search') {
      return `<span class="review-a">${formatAnswer(a)}</span>`;
    }

    // Multiple choice / dropdown — show all options
    if ((type === 'multiple_choice' || type === 'dropdown') && choices && choices.length) {
      const selected = Array.isArray(a) ? a : (a ? [a] : []);
      return `<div class="review-choices">
        ${choices.map(c => {
          const chosen = selected.includes(c.ref);
          return `<div class="review-choice ${chosen ? 'chosen' : ''}">
            <div class="review-choice-marker">${chosen ? CHECK_SVG : ''}</div>
            <span>${escapeHtml(c.label)}</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    // Free-text, number, date — just show the value
    return `<span class="review-a">${formatAnswer(a)}</span>`;
  }

  function formatAnswer(a) {
    if (a === true) return 'Yes';
    if (a === false) return 'No';
    if (Array.isArray(a)) {
      return a.map(x => choiceLabel(x) ?? x).join(', ');
    }
    if (typeof a === 'string' && schema.choice_index && schema.choice_index[a]) {
      return escapeHtml(schema.choice_index[a].label);
    }
    return escapeHtml(String(a ?? ''));
  }
  function choiceLabel(ref) {
    const ci = schema.choice_index && schema.choice_index[ref];
    return ci ? escapeHtml(ci.label) : null;
  }

  async function onSubmit() {
    const errEl = document.getElementById('submitErr');
    const btns = ['submitBtnDesk','submitBtnMob'].map(id => document.getElementById(id)).filter(Boolean);
    btns.forEach(b => { b.disabled = true; b.textContent = 'Submitting…'; });
    errEl.classList.remove('show');

    const groups = buildReviewGroups();
    const clientName = (extractField('first_name') + ' ' + extractField('last_name')).trim();
    const clientEmail = extractField('email');

    // Build plain text that mirrors the summary screen.
    // Selected options marked ✓, unselected marked ·
    function plainAnswer(r) {
      const { a, type, choices, ui_hint } = r;

      if (ui_hint === 'occupation_search') {
        return plainResolve(a);
      }
      if (type === 'yes_no') {
        const lines = [];
        lines.push((a === true  ? '  ✓ Yes' : '  · Yes'));
        lines.push((a === false ? '  ✓ No'  : '  · No'));
        return lines.join('\n');
      }
      if ((type === 'multiple_choice' || type === 'dropdown') && choices && choices.length) {
        const selected = Array.isArray(a) ? a : (a ? [a] : []);
        return choices.map(c => (selected.includes(c.ref) ? '  ✓ ' : '  · ') + c.label).join('\n');
      }
      return '  ' + plainResolve(a);
    }

    function plainResolve(a) {
      if (a === true) return 'Yes';
      if (a === false) return 'No';
      if (Array.isArray(a)) return a.map(x => (schema.choice_index[x] && schema.choice_index[x].label) || x).join(', ');
      if (typeof a === 'string' && schema.choice_index[a]) return schema.choice_index[a].label;
      if (typeof a === 'object' && a !== null) {
        // Custom types (sick pay, mortgage, dependents, work type)
        const parts = [];
        for (const [k, v] of Object.entries(a)) {
          if (v && v !== false && k !== 'dependents' && k !== 'none') {
            parts.push(k.replace(/_/g,' ') + ': ' + v);
          }
        }
        if (a.none) parts.push('None');
        if (a.dependents) a.dependents.forEach((d,i) => parts.push('Dependent ' + (i+1) + ': ' + [d.name,d.dob,d.rel].filter(Boolean).join(', ')));
        return parts.join(', ') || '—';
      }
      return String(a ?? '');
    }

    const lines = [];
    lines.push('PROTECTION FACT FIND — BAKER HUDSON HEALTH');
    lines.push('Client: ' + (clientName || '—'));
    if (clientEmail) lines.push('Email:  ' + clientEmail);
    lines.push('Date:   ' + new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'}));

    for (const g of groups) {
      lines.push('');
      lines.push('━━━ ' + g.title.toUpperCase() + ' ━━━');
      for (const r of g.rows) {
        lines.push('');
        lines.push(r.q);
        lines.push(plainAnswer(r));
      }
    }

    const summary = lines.join('\n');

    if (!WEB3FORMS_KEY) {
      stage().innerHTML = `
        <div class="card">
          <span class="eyebrow"><span class="dot"></span>Preview mode</span>
          <h1 class="q-title">Submission ready</h1>
          <p class="q-desc">No Web3Forms key is set in <code>config.js</code>.</p>
          <pre style="background:#fff;border:1px solid var(--line-strong);border-radius:10px;padding:16px;overflow:auto;max-height:60vh;font-size:13px;white-space:pre-wrap">${escapeHtml(summary)}</pre>
        </div>`;
      return;
    }

    try {
      const r = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          access_key: WEB3FORMS_KEY,
          subject: 'New fact find — ' + (clientName || 'Client'),
          name: clientName || 'Client',
          email: clientEmail || 'noreply@bakerhudsonhealth.com',
          message: summary,
          botcheck: '',
        }),
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || data.success === false) {
        throw new Error(data.message || 'Submit failed (' + r.status + ')');
      }
      clearState();
      stage().innerHTML = `
        <div class="center">
          <h2>Thank you.</h2>
          <p>Your fact find has been received. Your adviser will be in touch shortly.</p>
        </div>`;
    } catch (err) {
      btns.forEach(b => { b.disabled = false; b.textContent = 'Submit fact find →'; });
      errEl.textContent = 'There was a problem submitting your answers. Please try again or contact your adviser. (' + err.message + ')';
      errEl.classList.add('show');
    }
  }

  function extractField(key) {
    for (const e of schema.order) {
      if (e.kind === 'page') {
        for (const sf of (e.subfields || [])) {
          if (sf.subfield_key === key && answers[sf.ref]) return String(answers[sf.ref]);
        }
      } else if (e.kind === 'field' && e.subfield_key === key && answers[e.ref]) {
        return String(answers[e.ref]);
      }
    }
    return '';
  }
  function renderForOutput() {
    const groups = buildReviewGroups();
    return groups.map(g => ({
      section: g.title,
      items: g.rows.map(r => ({
        question: r.q,
        answer: r.a !== undefined ? (typeof r.a === 'object' ? JSON.stringify(r.a) : renderAnswerText(r.a)) : '',
        ref: r.ref || '',
      })),
    }));
  }
  function renderAnswerText(a) {
    if (a === true) return 'Yes';
    if (a === false) return 'No';
    if (Array.isArray(a)) return a.map(x => (schema.choice_index[x]?.label) ?? x).join(', ');
    if (typeof a === 'string' && schema.choice_index[a]) return schema.choice_index[a].label;
    return String(a ?? '');
  }

  // -------------------- Helpers --------------------
  // -------------------- Sectioned progress bar --------------------
  // Build the section list once, lazily
  let _progressSections = null;
  function getProgressSections() {
    if (_progressSections) return _progressSections;
    const CATEGORY_ORDER = ['Personal & Occupation', 'Finances', 'Lifestyle', 'Health'];
    const cats = new Map();
    for (const e of schema.order) {
      const cat = e.section_category || 'Health';
      if (!cats.has(cat)) cats.set(cat, { total: 0, refs: [] });
      cats.get(cat).total++;
      cats.get(cat).refs.push(e.ref);
    }
    _progressSections = CATEGORY_ORDER.filter(c => cats.has(c)).map(c => ({
      label: c, refs: cats.get(c).refs
    }));
    return _progressSections;
  }

  function eyebrow(entry, label) {
    let prefixText = entry.title_prefix || _condCtx || '';
    if (prefixText) prefixText = resolveTemplates(prefixText).replace(/\*+/g, '').trim();
    const prefix = prefixText
      ? `<span class="prefix-tag">${escapeHtml(prefixText)}</span> `
      : '';
    return `<span class="eyebrow"><span class="dot"></span>${prefix}${escapeHtml(label)}</span>`;
  }

  function setProgress(currentRef) {
    const segs = getProgressSections();
    const container = document.getElementById('progressSections');
    if (!container) return;

    // Find which category & position we're in
    const currentIdx = schema.order.findIndex(e => e.ref === currentRef);

    // Count how many entries per category precede the current position
    const catSeenCount = new Map();
    for (const s of segs) catSeenCount.set(s.label, 0);

    let currentCat = null;
    if (currentIdx >= 0) {
      for (let i = 0; i <= currentIdx; i++) {
        const e = schema.order[i];
        const cat = e.section_category || 'Health';
        if (catSeenCount.has(cat)) catSeenCount.set(cat, catSeenCount.get(cat) + 1);
      }
      currentCat = schema.order[currentIdx]?.section_category || 'Health';
    }

    container.innerHTML = segs.map(s => {
      const total = s.refs.length;
      const seen = catSeenCount.get(s.label) || 0;
      const pct = total > 0 ? Math.round(seen / total * 100) : 0;
      const isDone = pct >= 100;
      const isActive = s.label === currentCat;
      const isFuture = !isDone && !isActive && seen === 0;
      // Only clickable if the section has been started or completed
      const clickable = !isFuture && s.refs.length > 0;
      return `<div class="progress-segment ${isDone ? 'done' : isActive ? 'active' : ''} ${isFuture ? 'future' : ''}"
        ${clickable ? `data-cat="${s.label}" role="button" tabindex="0" title="Jump to ${s.label}"` : ''}>
        <div class="progress-segment-label">${s.label}</div>
        <div class="progress-segment-bar"><div class="progress-segment-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');

    // Wire click handlers
    container.querySelectorAll('[data-cat]').forEach(el => {
      el.addEventListener('click', () => jumpToCategory(el.dataset.cat));
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') jumpToCategory(el.dataset.cat); });
    });
  }

  function jumpToCategory(cat) {
    // Navigate to the first entry in this category that appears in the schema order
    for (const e of schema.order) {
      if (e.section_category === cat && orderById.has(e.ref)) {
        if (currentRef) history.push(currentRef);
        goTo(e.ref);
        return;
      }
    }
  }

  function onGlobalKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      const tag = (e.target && e.target.tagName) || '';
      // Don't intercept Enter inside multi-line textareas
      if (tag === 'TEXTAREA') return;
      const nb = document.getElementById('nextBtn');
      if (nb && !nb.disabled) { e.preventDefault(); nb.click(); }
    }
  }

  function autocompleteFor(entry) {
    const k = (entry.subfield_key || '').toLowerCase();
    const map = { first_name: 'given-name', last_name: 'family-name', email: 'email', phone_number: 'tel' };
    return map[k] || 'on';
  }

  // "None of the above" / "None of these" / "None" — selecting one of these is mutually
  // exclusive with selecting any other option, and should auto-advance the form. Detection
  // is by label match (case-insensitive) since Typeform doesn't tag them specially.
  // Matches: "None", "None of the above", "None of these", "None of these/Don't know",
  // "None of the listed groups", etc. Does NOT match labels like "None - fly as a passenger
  // only" where "None" is part of a substantive answer.
  const NONE_LABEL_RE = /^\s*none\s*($| of\b)/i;
  function isNoneOfAboveChoice(choice) {
    return NONE_LABEL_RE.test(choice.label || '');
  }
  function isNoneOfAboveRef(entry, ref) {
    if (!entry || !entry.choices) return false;
    const c = entry.choices.find(x => x.ref === ref);
    return c ? isNoneOfAboveChoice(c) : false;
  }

  // Inline format: convert *foo* → italics, [text](url) → links, **foo** → bold (rare)
  function formatTitle(s) {
    if (!s) return '';
    let t = resolveTemplates(s);
    t = escapeHtml(t);
    t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, txt, url) => {
      const isPdf = url.toLowerCase().endsWith('.pdf');
      const extra = isPdf ? ' download' : '';
      return `<a href="${url}" target="_blank" rel="noopener"${extra}>${txt}</a>`;
    });
    t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
    return t;
  }
  function stripFormatting(s) {
    if (!s) return '';
    return resolveTemplates(s).replace(/\*\*?(.+?)\*\*?/g, '$1').replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
  }

  function resolveTemplates(s) {
    if (!s) return '';
    let out = s;
    // {{hidden:NAME}} — values originally passed between forms via redirect URL
    out = out.replace(/\{\{hidden:([a-z_]+)\}\}/gi, (_, key) => {
      if (key === 'name') {
        for (const e of schema.order) {
          if (e.kind === 'page') {
            for (const sf of (e.subfields || [])) {
              if (sf.subfield_key === 'first_name' && answers[sf.ref]) return String(answers[sf.ref]);
            }
          } else if (e.kind === 'field' && e.subfield_key === 'first_name' && answers[e.ref]) {
            return String(answers[e.ref]);
          }
        }
        return '';
      }
      if (key === 'email' || key === 'phone_number') {
        for (const e of schema.order) {
          if (e.kind === 'page') {
            for (const sf of (e.subfields || [])) {
              if (sf.subfield_key === key && answers[sf.ref]) return String(answers[sf.ref]);
            }
          } else if (e.kind === 'field' && e.subfield_key === key && answers[e.ref]) {
            return String(answers[e.ref]);
          }
        }
        return '';
      }
      return '';
    });
    // {{field:UUID}} — Typeform "piping": insert the user's answer to a previous field
    out = out.replace(/\{\{field:([a-f0-9-]+)\}\}/gi, (_, ref) => {
      const v = answers[ref];
      if (v === undefined || v === null || v === '') return '…';
      if (v === true) return 'Yes';
      if (v === false) return 'No';
      if (Array.isArray(v)) {
        return v.map(x => (schema.choice_index[x] && schema.choice_index[x].label) || x).join(', ');
      }
      // String values may be choice refs that need looking up to get the readable label
      if (typeof v === 'string' && schema.choice_index[v]) {
        return schema.choice_index[v].label;
      }
      return String(v);
    });
    return out;
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function escapeAttr(s) { return escapeHtml(s); }
  function cloneValue(v) { return Array.isArray(v) ? v.slice() : v; }
})();
</script>
</body>
</html>
